server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Next.js static export: extensionless routes resolve to "<route>.html"
    # (e.g. /traces -> traces.html), with SPA fallback to index.html for
    # client-side routes. Replicates the old hub Go static handler.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Single-origin API proxy for compose/local (in k8s the ingress routes
    # /api -> hub directly, so this block is dormant). Variable upstream +
    # resolver so nginx starts even when "hub" is unresolvable.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $hub_upstream "hub:8080";
        proxy_pass http://$hub_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $hub_upstream "hub:8080";
        proxy_pass http://$hub_upstream;
    }
}
