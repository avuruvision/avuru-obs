apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "avuruops.fullname" . }}-migrate
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # post-install AND post-upgrade (NOT pre-*): with an in-chart ClickHouse,
    # pre-* hooks run before Helm applies the StatefulSet, so the migrator has
    # nothing to connect to (and a previously-failed release would never recover,
    # since CH still wouldn't exist). post-* hooks run AFTER Helm applies the
    # manifests and `--wait`s them ready, so ClickHouse is always up first. The
    # Job's own ~60s CH retry is a safety net. Migrations are additive and the
    # hub tolerates a not-yet-migrated store, so applying schema just after the
    # app rolls is safe.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "avuruops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.hub.repository "tag" (.Values.hub.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            {{- include "avuruops.clickhouseEnv" . | nindent 12 }}
            - name: AVURUOPS_RETENTION_TRACES_DAYS
              value: {{ .Values.retention.traces | quote }}
            - name: AVURUOPS_RETENTION_LOGS_DAYS
              value: {{ .Values.retention.logs | quote }}
            - name: AVURUOPS_RETENTION_METRICS_DAYS
              value: {{ .Values.retention.metrics | quote }}
            - name: AVURUOPS_RETENTION_PROFILES_DAYS
              value: {{ .Values.retention.profiles | quote }}
