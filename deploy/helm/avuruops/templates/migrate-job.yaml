apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "avuruops.fullname" . }}-migrate
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # post-install (NOT pre-install): with an in-chart ClickHouse, pre-install
    # hooks run before the StatefulSet exists, so the migrator would have
    # nothing to connect to. post-install applies the schema once CH is up;
    # pre-upgrade applies new migrations before the new app rolls. The Job's
    # own ~60s ClickHouse retry covers CH still becoming ready.
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "avuruops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.hub.repository "tag" (.Values.hub.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            {{- include "avuruops.clickhouseEnv" . | nindent 12 }}
            - name: AVURUOPS_RETENTION_TRACES_DAYS
              value: {{ .Values.retention.traces | quote }}
            - name: AVURUOPS_RETENTION_LOGS_DAYS
              value: {{ .Values.retention.logs | quote }}
