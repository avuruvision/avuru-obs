apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "avuruops.fullname" . }}-hub
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      {{- include "avuruops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        {{- include "avuruops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hub
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hub
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.hub.repository "tag" (.Values.hub.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "avuruops.clickhouseEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
