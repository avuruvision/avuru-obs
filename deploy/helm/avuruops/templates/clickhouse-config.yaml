{{- if not .Values.clickhouse.external.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avuruops.fullname" . }}-clickhouse
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
data:
  # Memory adapts to the container cgroup limit; heavy system-log tables are
  # disabled (a single-signal store doesn't need them at eval scale).
  low-resources.xml: |
    <clickhouse>
        <max_server_memory_usage_to_ram_ratio>0.8</max_server_memory_usage_to_ram_ratio>
        <mark_cache_size>268435456</mark_cache_size>
        <index_mark_cache_size>67108864</index_mark_cache_size>
        <uncompressed_cache_size>134217728</uncompressed_cache_size>
        <query_log remove="1"/>
        <query_thread_log remove="1"/>
        <query_views_log remove="1"/>
        <metric_log remove="1"/>
        <asynchronous_metric_log remove="1"/>
        <trace_log remove="1"/>
        <part_log remove="1"/>
        <text_log remove="1"/>
        <latency_log remove="1"/>
        <processors_profile_log remove="1"/>
    </clickhouse>
{{- end }}
