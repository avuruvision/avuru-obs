apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "avuruops.fullname" . }}-ui
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "avuruops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "avuruops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.ui.repository "tag" (.Values.ui.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # nginx proxies /api → hub (single-origin). FQDN so the literal
            # upstream resolves at startup regardless of resolv.conf search/ndots.
            # Port 80 is the hub *Service* port (targetPort 8080); the container's
            # 8080 is not exposed on the Service, so :8080 here would never route
            # (and an ambient mesh resets it). Matches the ingress /api backend.
            - name: HUB_UPSTREAM
              value: {{ printf "%s-hub.%s.svc.cluster.local:80" (include "avuruops.fullname" .) .Release.Namespace | quote }}
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
