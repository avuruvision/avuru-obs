apiVersion: v1
kind: Service
metadata:
  name: {{ include "avuruops.fullname" . }}-ui
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "avuruops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 80
      targetPort: http
