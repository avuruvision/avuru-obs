{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "avuruops.fullname" . }}
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Single-origin split: API + health to the hub, everything else to
          # the UI (most-specific paths first).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "avuruops.fullname" . }}-hub
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ include "avuruops.fullname" . }}-hub
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "avuruops.fullname" . }}-ui
                port:
                  number: 80
{{- end }}
