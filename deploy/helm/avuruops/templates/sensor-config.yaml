{{- if and .Values.sensor.enabled .Values.sensor.obi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avuruops.fullname" . }}-sensor-obi
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: sensor
data:
  obi-config.yml: |
    # Zero-code instrumentation of everything on the node, EXCEPT this
    # release's own namespace (the platform must not trace itself — OBI's
    # built-in defaults already skip kube-system, otelcol binaries, and OBI).
    discovery:
      instrument:
        - k8s_namespace: '*'
      exclude_instrument:
        - k8s_namespace: {{ .Release.Namespace | quote }}
    attributes:
      kubernetes:
        enable: true
    routes:
      # heuristic keeps http.route cardinality bounded (ids -> wildcards);
      # explicit because RED metric cardinality is a product concern.
      unmatched: heuristic
{{- end }}
{{- /* The agent needs >=1 active pipeline or the collector crash-loops. */}}
{{- $agentActive := and .Values.sensor.enabled .Values.sensor.agent.enabled (or .Values.sensor.agent.logs.enabled .Values.sensor.agent.kubeletstats.enabled) }}
{{- if $agentActive }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avuruops.fullname" . }}-sensor-agent
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: sensor
data:
  config.yaml: |
    receivers:
    {{- if .Values.sensor.agent.logs.enabled }}
      filelog:
        # Zero-config stdout/stderr collection for every pod on the node,
        # EXCEPT this release's namespace: the platform must not ingest its
        # own logs (gateway error -> agent ships it -> gateway error ...).
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/{{ .Release.Namespace }}_*/*/*.log
        start_at: beginning
        storage: file_storage
        operators:
          # Parses containerd/cri-o/docker formats and promotes k8s.pod.name,
          # k8s.namespace.name, k8s.container.name, k8s.pod.uid from the file
          # path to resource attributes.
          - type: container
    {{- end }}
    {{- if .Values.sensor.agent.kubeletstats.enabled }}
      # Node/pod CPU, memory, network from this node's kubelet (Supporting
      # signal tier). Read-only stats API via the pod ServiceAccount.
      kubeletstats:
        auth_type: serviceAccount
        endpoint: https://${env:K8S_NODE_NAME}:10250
        # kubelet serving certs are typically self-signed per node
        insecure_skip_verify: true
        collection_interval: {{ .Values.sensor.agent.kubeletstats.interval }}
        metric_groups: [node, pod]
    {{- end }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        filter:
          node_from_env_var: K8S_NODE_NAME
        extract:
          metadata:
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
      # Tailed logs carry no OTLP resource, so service.name is empty and the
      # Logs UI would show blank services — derive it from workload metadata.
      transform/service_name:
        error_mode: ignore
        log_statements:
          - context: resource
            statements:
              - set(attributes["service.name"], attributes["k8s.deployment.name"]) where attributes["service.name"] == nil
              - set(attributes["service.name"], attributes["k8s.statefulset.name"]) where attributes["service.name"] == nil
              - set(attributes["service.name"], attributes["k8s.daemonset.name"]) where attributes["service.name"] == nil
              - set(attributes["service.name"], attributes["k8s.container.name"]) where attributes["service.name"] == nil
      batch:
        send_batch_size: 2048
        timeout: 2s
    exporters:
      otlphttp:
        endpoint: http://{{ include "avuruops.fullname" . }}-gateway:4318
    extensions:
      health_check:
        endpoint: 0.0.0.0:13134
      # filelog offset checkpoints survive agent restarts (no re-ingestion).
      file_storage:
        directory: /var/lib/otel-agent
    service:
      extensions: [health_check, file_storage]
      pipelines:
    {{- if .Values.sensor.agent.logs.enabled }}
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, transform/service_name, batch]
          exporters: [otlphttp]
    {{- end }}
    {{- if .Values.sensor.agent.kubeletstats.enabled }}
        metrics:
          # k8sattributes adds workload names (deployment/statefulset) to pod
          # metrics via k8s.pod.uid, for the pods panel.
          receivers: [kubeletstats]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlphttp]
    {{- end }}
{{- end }}
