{{- /* A DaemonSet with zero containers is invalid — render only when at
       least one sensor container is active. */}}
{{- $agentActive := and .Values.sensor.agent.enabled (or .Values.sensor.agent.logs.enabled .Values.sensor.agent.kubeletstats.enabled) }}
{{- if and .Values.sensor.enabled (or .Values.sensor.obi.enabled $agentActive) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "avuruops.fullname" . }}-sensor
  labels:
    {{- include "avuruops.labels" . | nindent 4 }}
    app.kubernetes.io/component: sensor
spec:
  selector:
    matchLabels:
      {{- include "avuruops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sensor
  template:
    metadata:
      labels:
        {{- include "avuruops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sensor
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/sensor-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "avuruops.fullname" . }}-sensor
      # eBPF containers discover and inspect host processes.
      hostPID: true
      {{- with .Values.sensor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sensor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Kernel preflight: eBPF needs >=5.8 with BTF. Warn loudly, NEVER
        # block — on unsupported nodes the pod stays up for the non-eBPF
        # containers (logs/metrics) while OBI alone may fail.
        - name: kernel-preflight
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              KVER="$(uname -r)"
              MAJ="${KVER%%.*}"; REST="${KVER#*.}"; MIN="${REST%%.*}"
              OK=1
              if [ "$MAJ" -lt 5 ] || { [ "$MAJ" -eq 5 ] && [ "$MIN" -lt 8 ]; }; then OK=0; fi
              [ -f /sys/kernel/btf/vmlinux ] || OK=0
              if [ "$OK" = "1" ]; then
                echo "sensor preflight: kernel $KVER with BTF — eBPF supported"
              else
                echo "**********************************************************"
                echo "sensor preflight WARNING: kernel $KVER, BTF $( [ -f /sys/kernel/btf/vmlinux ] && echo present || echo MISSING )"
                echo "eBPF zero-code instrumentation needs kernel >=5.8 with BTF."
                echo "OBI will likely fail on this node; logs/metrics collection"
                echo "is unaffected. Set sensor.obi.enabled=false to silence."
                echo "**********************************************************"
              fi
              exit 0
      containers:
        {{- if .Values.sensor.obi.enabled }}
        # OBI — zero-code traces + RED metrics via eBPF (upstream, pinned).
        - name: obi
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.sensor.obi.image.repository "tag" .Values.sensor.obi.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            {{- if .Values.sensor.obi.privileged }}
            privileged: true
            {{- else }}
            capabilities:
              add:
                - BPF
                - PERFMON
                - SYS_PTRACE
                - NET_RAW
                - CHECKPOINT_RESTORE
                - DAC_READ_SEARCH
                - SYS_RESOURCE
              drop:
                - ALL
            {{- end }}
          env:
            - name: OTEL_EBPF_CONFIG_PATH
              value: /config/obi-config.yml
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://{{ include "avuruops.fullname" . }}-gateway:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
          volumeMounts:
            - name: obi-config
              mountPath: /config
              readOnly: true
            - name: var-run-obi
              mountPath: /var/run/obi
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
          resources:
            {{- toYaml .Values.sensor.obi.resources | nindent 12 }}
        {{- end }}
        {{- if $agentActive }}
        # Node collector — tails container stdout/stderr into the gateway
        # (zero-config logs tier). Runs as root: /var/log/pods is root-owned.
        - name: otel-agent
          image: {{ include "avuruops.image" (dict "registry" .Values.image.registry "repo" .Values.sensor.agent.image.repository "tag" .Values.sensor.agent.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config=/etc/avuru/config.yaml"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: agent-config
              mountPath: /etc/avuru
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: agent-storage
              mountPath: /var/lib/otel-agent
          ports:
            - name: agent-health
              containerPort: 13134
          livenessProbe:
            httpGet:
              path: /
              port: agent-health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: agent-health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.sensor.agent.resources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if .Values.sensor.obi.enabled }}
        - name: obi-config
          configMap:
            name: {{ include "avuruops.fullname" . }}-sensor-obi
        - name: var-run-obi
          emptyDir: {}
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        {{- end }}
        {{- if $agentActive }}
        - name: agent-config
          configMap:
            name: {{ include "avuruops.fullname" . }}-sensor-agent
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        - name: agent-storage
          hostPath:
            path: /var/lib/avuruops/otel-agent
            type: DirectoryOrCreate
        {{- end }}
{{- end }}
