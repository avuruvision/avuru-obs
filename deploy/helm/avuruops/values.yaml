# Avuru Obs — default values.
# Downstream overlays (e.g. a Harbor/Kustomize project) override image.registry,
# ingress.host, persistence, retention, and clickhouse.external without forking.

nameOverride: ""
fullnameOverride: ""

image:
  # Registry prefixed to every component repository (e.g. "harbor.example.com").
  # Empty = pull from the repository as-is (Docker Hub / GHCR style).
  registry: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# Hub: REST API only (the `migrate` subcommand runs the schema hook). The UI is
# a separate deployable; the hub API is the client-agnostic contract.
hub:
  repository: avuruops/hub
  tag: "" # defaults to .Chart.AppVersion
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

# UI: static SPA served by nginx, its own pod (separate resources/scaling).
# Single-origin: the ingress routes `/`→ui and `/api`→hub (no CORS).
ui:
  repository: avuruops/ui
  tag: "" # defaults to .Chart.AppVersion
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 128Mi

# Gateway: OTLP receiver → ClickHouse exporter (stock contrib collector + config).
gateway:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.154.0"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      memory: 512Mi

# Sensor: per-node DaemonSet for zero-code signal collection (eBPF). v0.1
# wires OBI (zero-code traces + RED); the otel-agent (logs, kubeletstats) and
# profiler containers join in later milestones, the Rust flow tracer in v0.2.
# Kernel ≥5.8 with BTF is required for eBPF; a preflight initContainer warns
# loudly (but never blocks) when the node can't support it.
sensor:
  enabled: true
  nodeSelector: {}
  tolerations: []
  # Node collector: tails container stdout/stderr (zero-config logs). Infra
  # metrics (kubeletstats) join this container in M3.
  agent:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.154.0" # keep in lockstep with the gateway pin (tech_stack.md)
    logs:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        memory: 256Mi
  obi:
    enabled: true
    image:
      repository: otel/ebpf-instrument
      tag: "v0.9.0" # pre-1.0 — pin exact, never float (agent_docs/tech_stack.md)
    # privileged=true is the reliable default across container runtimes and
    # kernels. Set false to run with the least-privilege capability set
    # (BPF/PERFMON/SYS_PTRACE/NET_RAW/CHECKPOINT_RESTORE/DAC_READ_SEARCH/
    # SYS_RESOURCE) instead — needs kernel ≥5.11.
    privileged: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

# ClickHouse: single-node StatefulSet by default; flip external.enabled to BYO.
clickhouse:
  external:
    enabled: false
    address: "" # host:9000 (native protocol) when external.enabled
    database: otel
    username: avuru
    existingSecret: "" # Secret with key `clickhouse-password`; overrides auth.password
  image:
    repository: clickhouse/clickhouse-server
    tag: "26.3"
  auth:
    username: avuru
    password: avuru # in-chart default — override or use existingSecret in prod
    existingSecret: ""
  persistence:
    enabled: true
    storageClassName: "" # "" = cluster default StorageClass
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 4Gi

# Per-signal retention in DAYS, applied as ClickHouse TTL by `hub migrate`.
retention:
  traces: 7
  logs: 3
  metrics: 7

ingress:
  enabled: false
  className: ""
  host: avuruops.local
  annotations: {}
  tls: []

# Auth is a forward placeholder: the UI ships open in v0.1; OIDC is v0.2.
# Enforce auth at your ingress (oauth2-proxy / Keycloak) downstream.
auth:
  enabled: false

service:
  type: ClusterIP
