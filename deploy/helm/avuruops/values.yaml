# Avuru Obs — default values.
# Downstream overlays (e.g. a Harbor/Kustomize project) override image.registry,
# ingress.host, persistence, retention, and clickhouse.external without forking.

nameOverride: ""
fullnameOverride: ""

image:
  # Registry prefixed to every component repository (e.g. "harbor.devops.lab").
  # Empty = pull from the repository as-is (Docker Hub / GHCR style).
  registry: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# Hub: REST API only (the `migrate` subcommand runs the schema hook). The UI is
# a separate deployable; the hub API is the client-agnostic contract.
hub:
  repository: avuruops/hub
  tag: "" # defaults to .Chart.AppVersion
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

# UI: static SPA served by nginx, its own pod (separate resources/scaling).
# Single-origin: the ingress routes `/`→ui and `/api`→hub (no CORS).
ui:
  repository: avuruops/ui
  tag: "" # defaults to .Chart.AppVersion
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 128Mi

# Gateway: OTLP receiver → ClickHouse exporter (stock contrib collector + config).
gateway:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.154.0"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      memory: 512Mi

# ClickHouse: single-node StatefulSet by default; flip external.enabled to BYO.
clickhouse:
  external:
    enabled: false
    address: "" # host:9000 (native protocol) when external.enabled
    database: otel
    username: avuru
    existingSecret: "" # Secret with key `clickhouse-password`; overrides auth.password
  image:
    repository: clickhouse/clickhouse-server
    tag: "26.3"
  auth:
    username: avuru
    password: avuru # in-chart default — override or use existingSecret in prod
    existingSecret: ""
  persistence:
    enabled: true
    storageClassName: "" # "" = cluster default StorageClass
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 4Gi

# Per-signal retention in DAYS, applied as ClickHouse TTL by `hub migrate`.
retention:
  traces: 7
  logs: 3

ingress:
  enabled: false
  className: ""
  host: avuruops.local
  annotations: {}
  tls: []

# Auth is a forward placeholder: the UI ships open in v0.1; OIDC is v0.2.
# Enforce auth at your ingress (oauth2-proxy / Keycloak) downstream.
auth:
  enabled: false

service:
  type: ClusterIP
